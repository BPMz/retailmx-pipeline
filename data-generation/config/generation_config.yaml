project:
  name: RetailMax
  locale: es_MX
  seed: 42

tables:
    proveedores: 80 #800
    articulos: 500 #5000
    tiendas: 15 #150
    miembros: 5000 #50000
    ventas: 10000 #1000000
    stock: 7500 #75000
    devoluciones: 500 #5000

# Periodo principal de las tablas transaccionales.
date_range:
  start_date: "2024-06-01"
  end_date: "2025-06-30"

# Rutas donde se guardarán los datos generados.
paths:
  source: output

output:
  formats:
    - csv
    - parquet

# Porcentaje aproximado de nulos en campos no críticos.
data_quality:
  null_percentage: 0.05

# Porcentajes pequeños para tres anomalías.
anomalies:
  enabled: true
  duplicate_sales_rate: 0.003
  out_of_range_dates_rate: 0.002
  inconsistent_returns_rate: 0.005